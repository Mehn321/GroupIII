<!DOCTYPE html>
<html>
<head>
    <title>Gemini API Test</title>
    <style>
        body { font-family: Arial; margin: 30px; background: #f5f5f5; }
        .section { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .pass { color: #27ae60; font-weight: bold; }
        .fail { color: #e74c3c; font-weight: bold; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #764ba2; }
        input { padding: 10px; width: 300px; font-size: 14px; }
        #result { margin-top: 20px; padding: 15px; background: #ecf0f1; border-radius: 5px; font-family: monospace; white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body>

<h1>🔧 Gemini API Test</h1>

<div class="section">
    <h2>API Configuration</h2>
    <p>API Key: <span class="pass"><?php echo substr(GEMINI_API_KEY, 0, 10) . '...' . substr(GEMINI_API_KEY, -10); ?></span></p>
    <p>API Endpoint: <span class="pass"><?php echo GEMINI_API_URL; ?></span></p>
    <p>cURL Available: <span class="<?php echo function_exists('curl_init') ? 'pass' : 'fail'; ?>">
        <?php echo function_exists('curl_init') ? '✓ Yes' : '✗ No'; ?>
    </span></p>
</div>

<div class="section">
    <h2>Test Gemini API</h2>
    <p>
        <label>Question: </label><br/>
        <input type="text" id="question" placeholder="Ask a question..." value="What are your office hours?" style="width: 400px;">
    </p>
    <button onclick="testGemini()">Test API Call</button>
    <div id="result"></div>
</div>

<script>
    function testGemini() {
        const question = document.getElementById('question').value;
        const resultDiv = document.getElementById('result');
        resultDiv.textContent = 'Testing...';
        
        fetch('api/test_gemini.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: question })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                resultDiv.textContent = '✓ API SUCCESS\n\nResponse:\n' + data.response;
            } else {
                resultDiv.textContent = '✗ API FAILED\n\nError:\n' + data.error + '\n\nDetails:\n' + (data.details || 'None');
            }
        })
        .catch(e => {
            resultDiv.textContent = '✗ Request Failed\n\n' + e.message;
        });
    }
</script>

</body>
</html>
